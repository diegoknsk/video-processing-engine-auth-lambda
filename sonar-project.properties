# SonarCloud — configuração do projeto (Storie-15)
# Ajuste sonar.projectKey e sonar.organization conforme o projeto criado em https://sonarcloud.io
sonar.projectKey=video-processing-engine-auth-lambda
sonar.organization=diegoknsk

sonar.sources=src/
sonar.tests=tests/
sonar.cs.opencover.reportsPaths=tests/**/TestResults/**/coverage.opencover.xml

# Excluir bin/obj e arquivos gerados
sonar.exclusions=**/bin/**,**/obj/**,**/*.Designer.cs
sonar.test.exclusions=tests/**/
sonar.coverage.exclusions=**/Program.cs,**/*Extensions.cs
